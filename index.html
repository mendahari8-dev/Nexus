<!DOCTYPE html>

<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="Tradexo AI"/>
  <meta name="theme-color" content="#080D18"/>
  <title>Tradexo AI</title>
  <style>
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
    html,body,#root{margin:0;padding:0;height:100%;width:100%;overflow:hidden;}
    body{background:#080D18;font-family:system-ui,-apple-system,sans-serif;overscroll-behavior:none;}
    @keyframes lp{0%{width:0}100%{width:100%}}
    @keyframes blink{0%,100%{opacity:1}50%{opacity:0.3}}
    @keyframes popIn{from{opacity:0;transform:scale(0.88)}to{opacity:1;transform:scale(1)}}
    @keyframes robotFloat{0%,100%{transform:translateY(0px)}50%{transform:translateY(-10px)}}
    .ls-nexus{color:#FFF;font-weight:900;text-shadow:0 0 60px rgba(255,255,255,0.95);}
    .ls-pro{background:linear-gradient(135deg,#00F5A0,#10B981);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;font-weight:900;}
    .ls-sub{color:rgba(255,255,255,0.35);font-size:11px;letter-spacing:4px;}
  </style>
</head>
<body>
  <div id="ls" style="position:fixed;top:0;left:0;right:0;bottom:0;background:#080D18;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;"><div style="animation:robotFloat 2s ease-in-out infinite;margin-bottom:20px;filter:drop-shadow(0 0 24px #00F5A055);">
      <svg width="120" height="130" viewBox="0 0 120 130" fill="none" xmlns="http://www.w3.org/2000/svg">
        <!-- Antenna -->
        <line x1="60" y1="8" x2="60" y2="22" stroke="#00F5A0" stroke-width="2.5" stroke-linecap="round"/>
        <circle cx="60" cy="6" r="4" fill="#00F5A0" opacity="0.9"/>
        <circle cx="60" cy="6" r="7" fill="#00F5A0" opacity="0.15"/>
        <!-- Head -->
        <rect x="28" y="22" width="64" height="44" rx="14" fill="#0a1628" stroke="#00F5A0" stroke-width="2"/>
        <rect x="28" y="22" width="64" height="44" rx="14" fill="url(#headGrad)" opacity="0.4"/>
        <!-- Eyes -->
        <rect x="38" y="34" width="18" height="12" rx="4" fill="#00F5A0" opacity="0.15"/>
        <rect x="64" y="34" width="18" height="12" rx="4" fill="#00F5A0" opacity="0.15"/>
        <rect x="40" y="36" width="14" height="8" rx="3" fill="#00F5A0" opacity="0.9"/>
        <rect x="66" y="36" width="14" height="8" rx="3" fill="#00F5A0" opacity="0.9"/>
        <!-- Eye glow -->
        <rect x="40" y="36" width="14" height="8" rx="3" fill="#00F5A0" filter="url(#glow)"/>
        <rect x="66" y="36" width="14" height="8" rx="3" fill="#00F5A0" filter="url(#glow)"/>
        <!-- Pupils -->
        <rect x="44" y="38" width="6" height="4" rx="1.5" fill="#080D18"/>
        <rect x="70" y="38" width="6" height="4" rx="1.5" fill="#080D18"/>
        <!-- Mouth / display -->
        <rect x="40" y="52" width="40" height="8" rx="4" fill="#00F5A0" opacity="0.08" stroke="#00F5A0" stroke-width="1" stroke-opacity="0.3"/>
        <rect x="42" y="54" width="10" height="4" rx="2" fill="#00F5A0" opacity="0.7"/>
        <rect x="55" y="54" width="6" height="4" rx="2" fill="#00F5A0" opacity="0.4"/>
        <rect x="64" y="54" width="13" height="4" rx="2" fill="#00F5A0" opacity="0.6"/>
        <!-- Neck -->
        <rect x="52" y="66" width="16" height="8" rx="4" fill="#0a1628" stroke="#00F5A0" stroke-width="1.5" stroke-opacity="0.6"/>
        <!-- Body -->
        <rect x="18" y="74" width="84" height="52" rx="16" fill="#0a1628" stroke="#00F5A0" stroke-width="2"/>
        <rect x="18" y="74" width="84" height="52" rx="16" fill="url(#bodyGrad)" opacity="0.3"/>
        <!-- Chest panel -->
        <rect x="30" y="82" width="60" height="36" rx="10" fill="#00F5A0" opacity="0.05" stroke="#00F5A0" stroke-width="1" stroke-opacity="0.2"/>
        <!-- Chest lights -->
        <circle cx="42" cy="93" r="5" fill="#00F5A0" opacity="0.8"/>
        <circle cx="42" cy="93" r="8" fill="#00F5A0" opacity="0.1"/>
        <circle cx="60" cy="93" r="5" fill="#3B82F6" opacity="0.8"/>
        <circle cx="60" cy="93" r="8" fill="#3B82F6" opacity="0.1"/>
        <circle cx="78" cy="93" r="5" fill="#F59E0B" opacity="0.8"/>
        <circle cx="78" cy="93" r="8" fill="#F59E0B" opacity="0.1"/>
        <!-- Signal bars on chest -->
        <rect x="34" y="107" width="6" height="4" rx="1" fill="#00F5A0" opacity="0.4"/>
        <rect x="43" y="103" width="6" height="8" rx="1" fill="#00F5A0" opacity="0.6"/>
        <rect x="52" y="99" width="6" height="12" rx="1" fill="#00F5A0" opacity="0.8"/>
        <rect x="61" y="99" width="6" height="12" rx="1" fill="#00F5A0" opacity="0.9"/>
        <rect x="70" y="103" width="6" height="8" rx="1" fill="#00F5A0" opacity="0.6"/>
        <rect x="79" y="107" width="6" height="4" rx="1" fill="#00F5A0" opacity="0.4"/>
        <!-- Arms -->
        <rect x="2" y="76" width="16" height="36" rx="8" fill="#0a1628" stroke="#00F5A0" stroke-width="1.5"/>
        <rect x="102" y="76" width="16" height="36" rx="8" fill="#0a1628" stroke="#00F5A0" stroke-width="1.5"/>
        <!-- Hand joints -->
        <circle cx="10" cy="118" r="5" fill="#0a1628" stroke="#00F5A0" stroke-width="1.5"/>
        <circle cx="110" cy="118" r="5" fill="#0a1628" stroke="#00F5A0" stroke-width="1.5"/>
        <!-- Defs -->
        <defs>
          <linearGradient id="headGrad" x1="28" y1="22" x2="92" y2="66" gradientUnits="userSpaceOnUse">
            <stop offset="0%" stop-color="#00F5A0" stop-opacity="0.3"/>
            <stop offset="100%" stop-color="#3B82F6" stop-opacity="0.1"/>
          </linearGradient>
          <linearGradient id="bodyGrad" x1="18" y1="74" x2="102" y2="126" gradientUnits="userSpaceOnUse">
            <stop offset="0%" stop-color="#00F5A0" stop-opacity="0.2"/>
            <stop offset="100%" stop-color="#3B82F6" stop-opacity="0.05"/>
          </linearGradient>
          <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
            <feGaussianBlur stdDeviation="2" result="blur"/>
            <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
          </filter>
        </defs>
      </svg>
    </div><div style="font-size:28px;font-weight:900;letter-spacing:2px;margin-bottom:4px;"><span class="ls-nexus">TRADEXO</span> <span class="ls-pro">AI</span></div>
