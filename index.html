/* ── Scrollbar ─────────────────────────────────────── */
::-webkit-scrollbar{display:none;}
*{scrollbar-width:none;}

/* ── Interactions ──────────────────────────────────── */
button{-webkit-appearance:none;cursor:pointer;}
button:active{opacity:0.82;transform:scale(0.97);transition:transform 0.08s,opacity 0.08s;}
input,textarea,select{-webkit-appearance:none;}
input:focus,textarea:focus,select:focus{outline:none;}
a{-webkit-touch-callout:none;}

/* ── Animations ────────────────────────────────────── */
@keyframes lp{0%{width:0}100%{width:100%}}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.3}}
@keyframes popIn{from{opacity:0;transform:scale(0.88)}to{opacity:1;transform:scale(1)}}
@keyframes robotFloat{0%,100%{transform:translateY(0px)}50%{transform:translateY(-10px)}}
@keyframes slideUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideDown{from{opacity:0;transform:translateY(-16px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
@keyframes neonPulse{0%,100%{box-shadow:0 0 8px #00F5A044}50%{box-shadow:0 0 20px #00F5A088}}

/* ── Performance hints ─────────────────────────────── */
.anim-float{will-change:transform;}
.anim-pop{will-change:transform,opacity;}
.anim-fade{will-change:opacity;}

/* ── Skeleton Loader ───────────────────────────────── */
.skeleton{
  background:linear-gradient(90deg,#1E293B 25%,#263347 50%,#1E293B 75%);
  background-size:200% 100%;
  animation:shimmer 1.6s infinite;
  border-radius:8px;
}
.skeleton-text{height:14px;margin-bottom:8px;border-radius:4px;}
.skeleton-text.wide{width:85%;}
.skeleton-text.mid{width:60%;}
.skeleton-text.sm{width:40%;}
.skeleton-card{
  background:linear-gradient(90deg,#111827 25%,#1a2438 50%,#111827 75%);
  background-size:200% 100%;
  animation:shimmer 1.6s infinite;
  border-radius:16px;
  border:1px solid #1E293B;
}
.skeleton-avatar{
  width:44px;height:44px;border-radius:12px;
  flex-shrink:0;
}

/* ── Splash Screen ─────────────────────────────────── */
.ls-nexus{color:#FFF;font-weight:900;text-shadow:0 0 60px rgba(255,255,255,0.95);}
.ls-pro{background:linear-gradient(135deg,#00F5A0,#10B981);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;font-weight:900;}
.ls-sub{color:rgba(255,255,255,0.35);font-size:11px;letter-spacing:4px;}

/* ── Responsive ────────────────────────────────────── */
/* Mobile first (default) — max 430px */
#root{max-width:430px;margin:0 auto;position:relative;}

/* Tablet: 431px – 768px */
@media (min-width:431px) and (max-width:768px){
  #root{max-width:480px;}
  body{background:#060B15;}
}

/* Desktop: 769px+ — show centered app with sidebar space */
@media (min-width:769px){
  body{
    background:#04080F;
    display:flex;
    align-items:flex-start;
    justify-content:center;
    min-height:100vh;
    overflow:auto;
  }
  #root{
    max-width:430px;
    min-height:100vh;
    height:auto;
    overflow:hidden;
    box-shadow:0 0 60px rgba(0,245,160,0.08),0 0 0 1px rgba(255,255,255,0.05);
    border-radius:0;
    position:relative;
  }
  html,body{overflow:auto;}
}

/* Large desktop: 1200px+ */
@media (min-width:1200px){
  body::before{
    content:'';
    position:fixed;
    inset:0;
    background:
      radial-gradient(ellipse at 20% 50%, rgba(0,245,160,0.04) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 20%, rgba(59,130,246,0.04) 0%, transparent 60%);
    pointer-events:none;
    z-index:0;
  }
  #root{position:relative;z-index:1;}
}

/* ── iOS Safe Area ─────────────────────────────────── */
@supports (padding-bottom: env(safe-area-inset-bottom)){
  .tab-bar-safe{padding-bottom:calc(8px + env(safe-area-inset-bottom));}
}

/* ── Dark mode media query (system) ────────────────── */
@media (prefers-color-scheme:dark){
  body{background:#080D18;}
}

/* ── Reduced motion ────────────────────────────────── */
@media (prefers-reduced-motion:reduce){
  *{animation-duration:0.01ms !important;transition-duration:0.01ms !important;}
}
